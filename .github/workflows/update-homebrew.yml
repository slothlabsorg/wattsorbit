name: Update Homebrew Tap

# Fires when a published release becomes live on GitHub (not on draft create).
# Also exposes workflow_dispatch so we can re-run the cask update for any past
# tag — handy if the tap ever gets out of sync or the cask needs regenerating.
on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to republish (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  update-cask:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag and version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download DMGs and compute SHA256
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          mkdir dmgs
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "*_aarch64.dmg" \
            --pattern "*_x64.dmg" \
            --dir dmgs

          SHA_ARM=$(shasum -a 256 dmgs/*_aarch64.dmg | cut -d' ' -f1)
          SHA_X64=$(shasum -a 256 dmgs/*_x64.dmg     | cut -d' ' -f1)
          echo "arm=$SHA_ARM" >> "$GITHUB_OUTPUT"
          echo "x64=$SHA_X64" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: slothlabsorg/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Write Cask
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SHA_ARM: ${{ steps.sha.outputs.arm }}
          SHA_X64: ${{ steps.sha.outputs.x64 }}
        run: |
          mkdir -p tap/Casks
          # Ruby `#{version}` interpolation must survive literal — use a quoted
          # heredoc so bash leaves it alone, then sed in the placeholders.
          cat > tap/Casks/wattsorbit.rb <<'RUBY'
          cask "wattsorbit" do
            version "__VERSION__"

            on_arm do
              sha256 "__SHA_ARM__"
              url "https://github.com/slothlabsorg/wattsorbit/releases/download/v#{version}/WattsOrbit_#{version}_aarch64.dmg"
            end
            on_intel do
              sha256 "__SHA_X64__"
              url "https://github.com/slothlabsorg/wattsorbit/releases/download/v#{version}/WattsOrbit_#{version}_x64.dmg"
            end

            name        "WattsOrbit"
            desc        "Cross-platform menu-bar power monitor"
            homepage    "https://github.com/slothlabsorg/wattsorbit"

            # Unsigned build — Gatekeeper will quarantine. Users run
            # `xattr -dr com.apple.quarantine /Applications/WattsOrbit.app`
            # once, until we ship a notarized release.
            app "WattsOrbit.app"

            zap trash: [
              "~/Library/Application Support/io.slothlabs.wattsorbit",
              "~/Library/Preferences/io.slothlabs.wattsorbit.plist",
              "~/Library/Saved Application State/io.slothlabs.wattsorbit.savedState",
            ]
          end
          RUBY
          sed -i \
            -e "s|__VERSION__|$VERSION|g" \
            -e "s|__SHA_ARM__|$SHA_ARM|g" \
            -e "s|__SHA_X64__|$SHA_X64|g" \
            tap/Casks/wattsorbit.rb

      - name: Commit and push
        working-directory: tap
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add Casks/wattsorbit.rb
          if git diff --cached --quiet; then
            echo "Cask already up to date — nothing to push."
            exit 0
          fi
          git commit -m "wattsorbit $VERSION"
          git push
