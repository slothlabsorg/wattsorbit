name: Release

on:
  push:
    tags:
      - 'v*'

# WattsOrbit reads macOS power APIs — macOS only
jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
            label: apple-silicon
          - args: --target x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
            label: intel

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # No Apple code signing for v1.0.0 — the DMG ships unsigned and users
      # will see "unverified developer" on first launch (right-click → Open
      # gets around it). To enable signing later, add the six APPLE_* secrets
      # to the repo and uncomment the block below.
      #
      #   APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
      #   APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #   APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
      #   APPLE_ID:                   ${{ secrets.APPLE_ID }}
      #   APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
      #   APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          TAURI_PRIVATE_KEY:          ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD:         ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'WattsOrbit ${{ github.ref_name }}'
          releaseBody: |
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
