name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS ──────────────────────────────────────────────────────────
          - os: macos-latest
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
            label: macos-apple-silicon
          - os: macos-latest
            args: --target x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
            label: macos-intel

          # ── Linux ──────────────────────────────────────────────────────────
          # ubuntu-22.04 (glibc 2.35) gives the widest compatibility for .deb
          # and .AppImage — 24.04 glibc is too new for older distros. We build
          # both x86_64 and aarch64 natively (GitHub now exposes an ARM64
          # Ubuntu runner — no qemu/cross-compilation needed, which matters
          # because webkit2gtk cross-compiles are painful) so users on
          # Apple-Silicon VMs (UTM, Parallels), Raspberry Pi 4/5, and AWS
          # Graviton can install a matching .deb / .AppImage.
          - os: ubuntu-22.04
            args: ''
            rust-target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - os: ubuntu-22.04-arm
            args: ''
            rust-target: aarch64-unknown-linux-gnu
            label: linux-aarch64

          # ── Windows ────────────────────────────────────────────────────────
          - os: windows-latest
            args: ''
            rust-target: x86_64-pc-windows-msvc
            label: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri v2 needs WebKitGTK 4.1 + GLib dev headers on Linux.
      # startsWith() matches both ubuntu-22.04 (x86_64) and ubuntu-22.04-arm.
      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            build-essential \
            libssl-dev \
            file \
            wget \
            libxdo-dev \
            xdg-utils

      - run: npm ci

      # No Apple code signing for v1.0.0 — the DMG ships unsigned and users
      # will see "unverified developer" on first launch (right-click → Open
      # gets around it). To enable signing later, add the six APPLE_* secrets
      # to the repo and uncomment the block below.
      #
      #   APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
      #   APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #   APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
      #   APPLE_ID:                   ${{ secrets.APPLE_ID }}
      #   APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
      #   APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
      #
      # Windows code-signing is likewise deferred — the .msi ships unsigned
      # and SmartScreen will warn on first launch. Add WINDOWS_CERTIFICATE /
      # WINDOWS_CERTIFICATE_PASSWORD once an EV cert is purchased.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'WattsOrbit ${{ github.ref_name }}'
          releaseBody: |
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload .sig files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          echo "=== Searching for .sig files ==="
          find src-tauri/target -name "*.sig" -o -name "*.tar.gz" 2>/dev/null | sort
          echo "=== Uploading ==="
          find src-tauri/target -name "*.sig" | while read f; do
            echo "Uploading: $f"
            gh release upload "${{ github.ref_name }}" "$f" \
              --repo "${{ github.repository }}" --clobber || true
          done
          echo "=== Done ==="
