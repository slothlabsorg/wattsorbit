name: Update Manifest

on:
  release:
    types: [published]

jobs:
  manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # RELEASE_TOKEN is a PAT with bypass on the main branch-protection rule.
          # The default GITHUB_TOKEN cannot push to main (PR required), so the
          # persisted credentials used by "git push origin main" below must be
          # this PAT — same pattern as HOMEBREW_TAP_TOKEN in update-tap.yml.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: python3 scripts/gen-manifest.py > latest.json

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: update latest.json for ${{ github.ref_name }}" && \
            git push origin main
